Paste this over the whole file (pencil → select-all → paste → Commit), then Actions → Run workflow:


name: Build pyswisseph Android wheel

on:
  workflow_dispatch:
    inputs:
      pyswisseph_version:
        description: "pyswisseph version to build"
        default: "2.10.3.2"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install NDK r28 and point the build at it
        run: |
          echo "Runner's latest NDK: $ANDROID_NDK_LATEST_HOME"
          cat "$ANDROID_NDK_LATEST_HOME/source.properties" 2>/dev/null || true
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          echo "Available r28/r29 NDKs:"
          "$SDKMANAGER" --list 2>/dev/null | grep -oE 'ndk;2[89]\.[0-9.]+' | sort -u || true
          NDK_PKG=$("$SDKMANAGER" --list 2>/dev/null | grep -oE 'ndk;2[89]\.[0-9.]+' | sort -V | tail -1)
          echo "Chosen NDK package: $NDK_PKG"
          yes | "$SDKMANAGER" --install "$NDK_PKG" >/dev/null
          NDK_VER="${NDK_PKG#ndk;}"
          NDK_PATH="$ANDROID_HOME/ndk/$NDK_VER"
          echo "Installed NDK at: $NDK_PATH"
          cat "$NDK_PATH/source.properties" 2>/dev/null || true
          echo "ANDROID_NDK_ROOT=$NDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_LATEST_HOME=$NDK_PATH" >> "$GITHUB_ENV"

      - name: Fetch and extract the pyswisseph source (sdist)
        run: |
          python -m pip install --upgrade pip
          pip download "pyswisseph==${{ github.event.inputs.pyswisseph_version }}" \
            --no-binary :all: --no-deps -d sdist
          mkdir src
          tar -xzf sdist/pyswisseph-*.tar.gz -C src --strip-components=1
          ls -la src

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build Android wheels
        run: python -m cibuildwheel --platform android --output-dir wheelhouse src
        env:
          CIBW_BUILD: "cp313-*"
          ANDROID_API_LEVEL: "24"
          CIBW_ENVIRONMENT: 'LDFLAGS="-Wl,-z,max-page-size=16384"'

      - name: Verify 16 KB alignment of every .so
        run: |
          python -m pip install pyelftools
          python - <<'PY'
          import glob, sys, zipfile, tempfile, os
          from elftools.elf.elffile import ELFFile

          bad = False
          for whl in glob.glob("wheelhouse/*.whl"):
              print(f"\n=== {os.path.basename(whl)} ===")
              with tempfile.TemporaryDirectory() as d:
                  zipfile.ZipFile(whl).extractall(d)
                  for root, _, files in os.walk(d):
                      for fn in files:
                          if fn.endswith(".so"):
                              p = os.path.join(root, fn)
                              with open(p, "rb") as f:
                                  elf = ELFFile(f)
                                  aligns = [seg["p_align"] for seg in elf.iter_segments()
                                            if seg["p_type"] == "PT_LOAD"]
                              ok = all(a >= 16384 for a in aligns)
                              print(f"  {fn}: LOAD aligns={[hex(a) for a in aligns]}  16KB={'OK' if ok else 'NO'}")
                              if not ok:
                                  bad = True
          if bad:
              print("\nFAIL: at least one .so is not 16 KB aligned")
              sys.exit(1)
          print("\nAll .so files are 16 KB aligned")
          PY

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: pyswisseph-android-wheels
          path: wheelhouse/*.whl
          if-no-files-found: error
